<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Business Leads by Category & Location | LeadSignal</title>
<meta name="description" content="Browse free business lead lists by category and city. Phone numbers, websites, addresses and ratings — export to CSV instantly.">
<link rel="canonical" href="https://leadsignal-app.vercel.app/leads"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:#C1292E; --yellow:#F1D302; --black:#0a0a0a;
  --white:#FAFAF7; --off:#F2EDE4; --muted:#6b6b6b; --border:#E0DAD0;
  --font-d:'Barlow Condensed',sans-serif; --font-b:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--white);color:var(--black);font-family:var(--font-b);-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.container{max-width:1160px;margin:0 auto;padding:0 24px;}
nav{background:var(--black);border-bottom:3px solid var(--yellow);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:10px;}
.logo-box{width:32px;height:32px;background:var(--yellow);border-radius:6px;display:grid;place-items:center;}
.logo-box svg{width:17px;height:17px;color:var(--black);}
.brand-name{font-family:var(--font-d);font-size:22px;font-weight:900;color:var(--white);text-transform:uppercase;}
.btn-nav{background:var(--yellow);color:var(--black);font-weight:700;font-size:14px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;text-decoration:none;}
.hero{background:var(--black);padding:56px 0;border-bottom:3px solid var(--yellow);}
.eyebrow{font-family:var(--font-d);font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);margin-bottom:12px;}
.hero h1{font-family:var(--font-d);font-size:clamp(36px,5vw,60px);font-weight:900;text-transform:uppercase;color:#fff;line-height:1;margin-bottom:14px;}
.hero h1 span{color:var(--yellow);}
.hero p{font-size:16px;color:rgba(255,255,255,.45);max-width:520px;line-height:1.7;}
.main{padding:56px 0;}
.search-bar{margin-bottom:28px;}
.search-input{width:100%;max-width:480px;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-size:15px;outline:none;font-family:var(--font-b);}
.search-input:focus{border-color:var(--red);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;}
.card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:border-color .15s,box-shadow .15s,transform .15s;}
.card:hover{border-color:var(--red);box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px);}
.card-text{font-size:13px;font-weight:700;color:var(--black);line-height:1.3;}
.card-arrow{color:var(--red);flex-shrink:0;}
footer{background:var(--black);border-top:3px solid var(--yellow);padding:32px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.footer-brand{font-family:var(--font-d);font-size:20px;font-weight:900;color:#fff;text-transform:uppercase;}
.footer-links{display:flex;gap:16px;}
.footer-links a{color:rgba(255,255,255,.35);font-size:13px;font-weight:600;}
.footer-links a:hover{color:var(--yellow);}
.hidden{display:none!important;}
@media(max-width:600px){.container{padding:0 16px;}.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
  <a class="brand" href="/">
    <span class="logo-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
    <span class="brand-name">LeadSignal</span>
  </a>
  <a class="btn-nav" href="/app">Try it free</a>
</nav>

<section class="hero">
  <div class="container">
    <div class="eyebrow">Free business leads</div>
    <h1>Leads by <span>category</span><br>& location</h1>
    <p>Browse pre-built lead lists by business type and city. Phone numbers, websites, addresses and ratings — export to CSV free.</p>
  </div>
</section>

<main class="main">
  <div class="container">
    <div class="search-bar">
      <input class="search-input" id="filter-input" type="text" placeholder="Filter by category or city — e.g. dentists, Cairo..."/>
    </div>
    <div class="grid" id="grid">
      {% for combo in combos %}
      <a class="card" href="/leads/{{ combo.slug }}">
        <span class="card-text">{{ combo.label }}</span>
        <svg class="card-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
      {% endfor %}
    </div>
  </div>
</main>

<footer>
  <span class="footer-brand">LeadSignal</span>
  <div class="footer-links">
    <a href="/">Home</a>
    <a href="/app">Tool</a>
    <a href="/#faq">FAQ</a>
  </div>
</footer>

<script>
const input = document.getElementById('filter-input');
const cards = document.querySelectorAll('#grid .card');
input.addEventListener('input', () => {
  const q = input.value.toLowerCase();
  cards.forEach(c => {
    c.classList.toggle('hidden', !c.textContent.toLowerCase().includes(q));
  });
});
</script>
</body>
</html>
