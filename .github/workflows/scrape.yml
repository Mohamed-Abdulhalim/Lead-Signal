name: Scrape

on:
  schedule:
    - cron: "0 */04 * * *"
  workflow_dispatch:
    inputs:
      reset:
        description: "Reset city rotation to the top"
        type: boolean
        required: false
        default: false

concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome 124 (pinned)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip xvfb
          wget -q https://storage.googleapis.com/chrome-for-testing-public/124.0.6367.91/linux64/chrome-linux64.zip
          unzip chrome-linux64.zip
          sudo mv chrome-linux64 /opt/chrome
          sudo ln -sf /opt/chrome/chrome /usr/bin/google-chrome
          wget -q https://storage.googleapis.com/chrome-for-testing-public/124.0.6367.91/linux64/chromedriver-linux64.zip
          unzip chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          google-chrome --version
          chromedriver --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pick city for this run (using persistent rotation)
        id: pick
        shell: bash
        env:
          RESET: ${{ github.event.inputs.reset }}
        run: |
          state_file=".github/rotation_index.txt"

          mapfile -t cities <<'EOF'
          # ── TIER 1: United Kingdom ──
          London, United Kingdom
          Manchester, United Kingdom
          Birmingham, United Kingdom
          Leeds, United Kingdom
          Liverpool, United Kingdom
          Bristol, United Kingdom
          Edinburgh, United Kingdom
          Glasgow, United Kingdom
          Cardiff, United Kingdom
          Sheffield, United Kingdom
          Leicester, United Kingdom
          Nottingham, United Kingdom
          Southampton, United Kingdom
          Newcastle upon Tyne, United Kingdom
          Bradford, United Kingdom
          # ── TIER 1: UAE ──
          Dubai, United Arab Emirates
          Abu Dhabi, United Arab Emirates
          Sharjah, United Arab Emirates
          Ajman, United Arab Emirates
          Ras Al Khaimah, United Arab Emirates
          Fujairah, United Arab Emirates
          # ── TIER 1: Saudi Arabia ──
          Riyadh, Saudi Arabia
          Jeddah, Saudi Arabia
          Dammam, Saudi Arabia
          Khobar, Saudi Arabia
          Mecca, Saudi Arabia
          Medina, Saudi Arabia
          # ── TIER 2: USA ──
          New York, USA
          Los Angeles, USA
          Chicago, USA
          Houston, USA
          Phoenix, USA
          Philadelphia, USA
          San Antonio, USA
          San Diego, USA
          Dallas, USA
          San Jose, USA
          Austin, USA
          Jacksonville, USA
          Fort Worth, USA
          Columbus, USA
          Charlotte, USA
          Indianapolis, USA
          San Francisco, USA
          Seattle, USA
          Denver, USA
          Nashville, USA
          # ── TIER 2: Canada ──
          Toronto, Canada
          Vancouver, Canada
          Montreal, Canada
          Calgary, Canada
          Edmonton, Canada
          Ottawa, Canada
          Winnipeg, Canada
          Quebec City, Canada
          Hamilton, Canada
          Kitchener, Canada
          # ── TIER 2: Australia ──
          Sydney, Australia
          Melbourne, Australia
          Brisbane, Australia
          Perth, Australia
          Adelaide, Australia
          Gold Coast, Australia
          Canberra, Australia
          # ── TIER 2: Ireland ──
          Dublin, Ireland
          Cork, Ireland
          Galway, Ireland
          # ── TIER 3: Western Europe ──
          Paris, France
          Lyon, France
          Marseille, France
          Nice, France
          Toulouse, France
          Berlin, Germany
          Hamburg, Germany
          Munich, Germany
          Frankfurt, Germany
          Cologne, Germany
          Düsseldorf, Germany
          Amsterdam, Netherlands
          Rotterdam, Netherlands
          Utrecht, Netherlands
          The Hague, Netherlands
          Madrid, Spain
          Barcelona, Spain
          Valencia, Spain
          Seville, Spain
          Milan, Italy
          Rome, Italy
          Turin, Italy
          Naples, Italy
          Florence, Italy
          Zurich, Switzerland
          Geneva, Switzerland
          Basel, Switzerland
          Vienna, Austria
          Brussels, Belgium
          Antwerp, Belgium
          Stockholm, Sweden
          Gothenburg, Sweden
          Oslo, Norway
          Copenhagen, Denmark
          Helsinki, Finland
          Lisbon, Portugal
          Porto, Portugal
          # ── TIER 3: Middle East ──
          Doha, Qatar
          Manama, Bahrain
          Kuwait City, Kuwait
          Muscat, Oman
          Amman, Jordan
          # ── TIER 3: Egypt ──
          Cairo, Egypt
          Giza, Egypt
          Alexandria, Egypt
          New Cairo, Egypt
          Heliopolis, Egypt
          Nasr City, Egypt
          Zamalek, Egypt
          Maadi, Egypt
          Sharm El Sheikh, Egypt
          Hurghada, Egypt
          # ── TIER 4: East Asia ──
          Tokyo, Japan
          Osaka, Japan
          Kyoto, Japan
          Yokohama, Japan
          Nagoya, Japan
          Seoul, South Korea
          Busan, South Korea
          Shanghai, China
          Beijing, China
          Shenzhen, China
          Guangzhou, China
          Hong Kong, China
          Taipei, Taiwan
          Singapore, Singapore
          Kuala Lumpur, Malaysia
          Penang, Malaysia
          Bangkok, Thailand
          Chiang Mai, Thailand
          Jakarta, Indonesia
          Manila, Philippines
          Ho Chi Minh City, Vietnam
          Hanoi, Vietnam
          # ── TIER 4: South Asia ──
          Mumbai, India
          Delhi, India
          Bangalore, India
          Hyderabad, India
          Chennai, India
          Pune, India
          Karachi, Pakistan
          Lahore, Pakistan
          Dhaka, Bangladesh
          Colombo, Sri Lanka
          # ── TIER 4: Eastern Europe ──
          Prague, Czech Republic
          Warsaw, Poland
          Kraków, Poland
          Budapest, Hungary
          Bucharest, Romania
          Athens, Greece
          Istanbul, Turkey
          Ankara, Turkey
          # ── TIER 4: Latin America ──
          São Paulo, Brazil
          Rio de Janeiro, Brazil
          Mexico City, Mexico
          Bogotá, Colombia
          Santiago, Chile
          Buenos Aires, Argentina
          Lima, Peru
          # ── TIER 4: Africa ──
          Johannesburg, South Africa
          Cape Town, South Africa
          Nairobi, Kenya
          Lagos, Nigeria
          Casablanca, Morocco
          Accra, Ghana
          Tunis, Tunisia
          EOF

          filtered=()
          for c in "${cities[@]}"; do
            [[ -z "$c" ]] && continue
            [[ "$c" =~ ^# ]] && continue
            [[ "$c" =~ ^[[:space:]]*$ ]] && continue
            filtered+=("$c")
          done

          count=${#filtered[@]}
          if [[ $count -eq 0 ]]; then
            echo "No cities configured"; exit 1
          fi

          if [[ "$RESET" == "true" ]]; then
            idx=0
          elif [[ -f "$state_file" ]]; then
            read -r idx < "$state_file" || idx=0
          else
            idx=0
          fi

          if (( idx < 0 || idx >= count )); then
            idx=0
          fi

          city="${filtered[$idx]}"
          echo "CITY=$city" >> "$GITHUB_ENV"
          safe="$(echo "$city" | tr '[:space:]/,' '_')"
          echo "CITY_SAFE=$safe" >> "$GITHUB_ENV"

          next_idx=$(( (idx + 1) % count ))
          mkdir -p "$(dirname "$state_file")"
          echo "$next_idx" > "$state_file"

          echo "Picked city: $city (index $idx of $count). Next index will be $next_idx."

      - name: Persist rotation index
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/rotation_index.txt
          git commit -m "chore: advance rotation index to ${{ env.CITY_SAFE }}" || echo "No changes to commit"
          git push

      - name: Run scrape + clean + enrich + push
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: |
          echo "Running pipeline for: $CITY"
          python pipeline.py \
            --location "$CITY" \
            --categories-file categories.txt \
            --out-prefix "gha_${CITY_SAFE}"

      - name: Upload enriched CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: enriched_csv_${{ env.CITY_SAFE }}
          path: gha_${{ env.CITY_SAFE }}_enriched.csv
